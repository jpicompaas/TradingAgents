<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TradingAgents{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">TradingAgents</a>
    <nav>
      <a href="/run" {% if request.url.path.startswith("/run") %}class="active"{% endif %}>Run analysis</a>
      <a href="/reports" {% if request.url.path.startswith("/reports") %}class="active"{% endif %}>Browse reports</a>
      <a href="/references" {% if request.url.path.startswith("/references") %}class="active"{% endif %}>References</a>
    </nav>
  </header>
  <main class="container">
    {% block body %}{% endblock %}
  </main>
</body>
</html>
