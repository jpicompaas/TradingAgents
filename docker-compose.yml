services:
  tradingagents:
    build: .
    env_file:
      - .env
    # Use public DNS to bypass ISP resolvers that sinkhole fc.yahoo.com
    # (yfinance's cookie endpoint). Curl error 7 "after Nms" = DNS returned
    # a black-hole IP rather than a real one.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      # Bind-mount the run state to the host so logs/reports/memory are visible
      # at ./.tradingagents/{logs,cache,memory} on your machine.
      - ./.tradingagents:/home/appuser/.tradingagents
      # Auto-saved analysis bundles land here on the host.
      - ./trading-reports:/home/appuser/app/trading-reports
    tty: true
    stdin_open: true

  webapp:
    # Same image as the CLI service — the webapp imports the tradingagents
    # package directly and spawns ``python main.py`` for live runs.
    build: .
    image: tradingagents-tradingagents
    env_file:
      - .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./.tradingagents:/home/appuser/.tradingagents
      - ./trading-reports:/home/appuser/app/trading-reports
    ports:
      - "8000:8000"
    entrypoint: ["uvicorn"]
    command:
      - "webapp.main:app"
      - "--host=0.0.0.0"
      - "--port=8000"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./.tradingagents:/home/appuser/.tradingagents
      - ./trading-reports:/home/appuser/app/trading-reports
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  ollama_data:
